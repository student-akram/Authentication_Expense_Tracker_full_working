<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Report</title>
  <link rel="stylesheet" href="report.css">
</head>
<body>

  <div class="container">

    <h2>Expense Report (Premium)</h2>

    <!-- Filter Section -->
    <div class="filters">
      <button onclick="setFilter('daily')">Daily</button>
      <button onclick="setFilter('weekly')">Weekly</button>
      <button onclick="setFilter('monthly')">Monthly</button>
    </div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="reportBody">
      </tbody>
    </table>

    <!-- Summary -->
    <div class="summary">
      <p>Total Income: ₹ <span id="totalIncome">0</span></p>
      <p>Total Expense: ₹ <span id="totalExpense">0</span></p>
      <p>Net Savings: ₹ <span id="netSavings">0</span></p>
    </div>

    <!-- Download Button -->
    <button id="downloadBtn" disabled>
      Download Report (Premium Only)
    </button>

  </div>

  <script src="report.js"></script>
</body>
</html>
